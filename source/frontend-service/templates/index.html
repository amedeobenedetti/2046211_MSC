<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Mars Habitat Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body>

    <header>
        <div class="header-container">
            <h1>Mars Habitat Control Panel</h1>
            <p class="subtitle">Real-time habitat monitoring</p>
            <nav class="navbar">
                <a href="/" class="active">Dashboard</a>
                <a href="/rules">Automation Rules</a>
            </nav>
        </div>
    </header>

    <div class="page-container">
        <section>
            <h2>Sensors</h2>
            <div id="sensorGrid"></div>
        </section>

        <section>
            <h2>Actuators</h2>
            <div id="actuatorGrid"></div>
        </section>

        <section>
            <h2>Telemetry</h2>
            <div id="telemetryGrid"></div>
        </section>
    </div>

    <div id="notificationContainer" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="{{ url_for('static', path='js/dashboard.js') }}"></script>

</body>
</html>
