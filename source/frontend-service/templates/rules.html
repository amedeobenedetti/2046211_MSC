<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Rules</title>
<link rel="stylesheet" href="{{ url_for('static', path='css/rules.css') }}">
</head>

<body>

<div class="page-container">
    <header>
        <div class="header-container">
            <h1>Automation Rules</h1>
            <nav class="navbar">
                <a href="/">Dashboard</a>
                <a href="/rules" class="active">Automation Rules</a>
            </nav>
        </div>
    </header>

    <h2>Create Rule</h2>
    <form id="ruleForm" class="sensor-card">
        <input id="name" placeholder="Name">
        <input id="sensor" placeholder="Sensor">
        <input id="metric" placeholder="Metric">
        <select id="operator">
            <option>></option>
            <option><</option>
            <option>>=</option>
            <option><=</option>
            <option>=</option>
        </select>
        <input id="threshold" type="number" step="0.01" placeholder="Threshold">
        <input id="actuator" placeholder="Actuator">
        <select id="state">
            <option>ON</option>
            <option>OFF</option>
        </select>
        <button type="submit">Create</button>
    </form>

    <h2>Rules</h2>
    <div id="rules" class="grid-container">
        <!-- Le regole sono aggiunte tramite JS -->
    </div>
</div>

<div id="notificationContainer" aria-live="polite" aria-atomic="true"></div>

<script type="module" src="{{ url_for('static', path='js/rules.js') }}"></script>
</body>

</html>
